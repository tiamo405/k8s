apiVersion: v1
kind: LimitRange
metadata:
  name: limit-test
  namespace: quota-ns
spec:
  limits:
  - type: Container
    default:
      cpu: "300m"
      memory: "256Mi"
    defaultRequest:
      cpu: "200m"
      memory: "128Mi"
    min:
      cpu: "100m"
      memory: "64Mi"
    max:
      cpu: "400m"
      memory: "512Mi"
