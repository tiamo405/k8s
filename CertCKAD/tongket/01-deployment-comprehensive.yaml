# ============================================================================
# COMPREHENSIVE DEPLOYMENT EXAMPLE FOR CKAD EXAM
# Includes: ConfigMap, Secret, all Volume types, Probes, Resources, Replicas
# ============================================================================

---
# ConfigMap for storing configuration data
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  database-url: "postgres://db.default.svc.cluster.local:5432/app"
  log-level: "info"
  app.properties: |
    featureX=true
    maxConnections=50

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: default
type: Opaque
stringData:
  db-username: "admin"
  db-password: "supersecret"

---
# PV
apiVersion: v1
kind: PersistentVolume
metadata:
  name: app-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /mnt/data


---
# PersistentVolumeClaim used by deployment app-volumes
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# DEPLOYMENT WITH LITERAL ENV ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-env-literal
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-env-literal
  template:
    metadata:
      labels:
        app: app-env-literal
    spec:
      containers:
      - name: app
        image: nginx:latest
        env:
        - name: APP_NAME
          value: "MyCKADApp"
        - name: ENVIRONMENT
          value: "production"

---
# DEPLOYMENT WITH CONFIGMAP ENV, SECRET ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-env-configmap
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-env-configmap
  template:
    metadata:
      labels:
        app: app-env-configmap
    spec:
      containers:
      - name: app
        image: nginx:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: database-url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-level
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db-password

---
# DEPLOYMENT WITH DOWNWARD API ENV ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-env-downwardapi
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-env-downwardapi
  template:
    metadata:
      labels:
        app: app-env-downwardapi
    spec:
      containers:
      - name: app
        image: nginx:latest
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_LABELS
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app']

---
# DEPLOYMENT WITH ALL VOLUME TYPES
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-volumes
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-volumes
  template:
    metadata:
      labels:
        app: app-volumes
    spec:
      serviceAccountName: default
      initContainers:
      - name: init-config
        image: busybox:latest
        command: ['sh', '-c', 'echo "Initializing..." && mkdir -p /tmp/data']
        volumeMounts:
        - name: emptydir-volume
          mountPath: /tmp/data
      containers:
      - name: app
        image: nginx:latest
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: emptydir-volume
          mountPath: /tmp/data
        - name: hostpath-volume
          mountPath: /var/log/app
        - name: configmap-volume
          mountPath: /etc/config
          readOnly: true
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
        - name: pvc-volume
          mountPath: /data
        - name: downward-volume
          mountPath: /etc/podinfo
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
      volumes:
      - name: emptydir-volume
        emptyDir: {}
        # emptyDir:
        #   sizeLimit: "1Gi"
      - name: hostpath-volume
        hostPath:
          path: /var/log
          type: DirectoryOrCreate
      - name: configmap-volume
        configMap:
          name: app-config
          defaultMode: 0644
      - name: secret-volume
        secret:
          secretName: app-secret
          defaultMode: 0600
      - name: pvc-volume
        persistentVolumeClaim:
          claimName: app-pvc
      - name: downward-volume
        downwardAPI:
          items:
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
          - path: "annotations"
            fieldRef:
              fieldPath: metadata.annotations
          - path: "cpu-limit"
            resourceFieldRef:
              containerName: app
              resource: limits.cpu
          - path: "memory-limit"
            resourceFieldRef:
              containerName: app
              resource: limits.memory
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: disk
                operator: In
                values:
                - ssd
      terminationGracePeriodSeconds: 30

---
# DEPLOYMENT WITH PROBES GROUPED TOGETHER
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-probes
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-probes
  template:
    metadata:
      labels:
        app: app-probes
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
      terminationGracePeriodSeconds: 30
