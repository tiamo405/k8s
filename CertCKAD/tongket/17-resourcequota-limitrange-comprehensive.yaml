# ============================================================================
# RESOURCEQUOTA + LIMITRANGE EXAMPLES (CKAD)
# Aligned with: CertCKAD/resourceQuotaLimitRange/
# ============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: quota-ns

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: quota-ns
spec:
  hard:
    pods: "2"
    requests.cpu: 500m
    requests.memory: 512Mi

---
apiVersion: v1
kind: LimitRange
metadata:
  name: limit-test
  namespace: quota-ns
spec:
  limits:
  - type: Container
    default:
      cpu: "300m"
      memory: "256Mi"
    defaultRequest:
      cpu: "200m"
      memory: "128Mi"
    min:
      cpu: "100m"
      memory: "64Mi"
    max:
      cpu: "400m"
      memory: "512Mi"

---
# This pod violates LimitRange min CPU (50m < 100m)
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
  namespace: quota-ns
  labels:
    run: bad-pod
spec:
  containers:
  - name: bad-pod
    image: nginx
    resources:
      requests:
        cpu: 50m

# Quick commands:
# kubectl apply -f 17-resourcequota-limitrange-comprehensive.yaml
# kubectl -n quota-ns get quota,limitrange
# kubectl -n quota-ns describe pod bad-pod
