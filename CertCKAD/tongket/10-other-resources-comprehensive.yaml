# ============================================================================
# COMPREHENSIVE OTHER RESOURCES FOR CKAD EXAM
# Includes: Job, CronJob, DaemonSet, Namespace, RBAC, ResourceQuota, PDB
# ============================================================================

---
# ============================================================================
# NAMESPACE - FOR RESOURCE ISOLATION
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: prod

---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging

---
# ============================================================================
# JOB - ONE-TIME OR BATCH WORK
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: data-processing-job
  namespace: default
spec:
  # Number of successful completions required
  completions: 3
  
  # Number of parallel pods running simultaneously
  parallelism: 2
  
  # Time limit for job execution (seconds)
  ttlSecondsAfterFinished: 3600  # Clean up job 1 hour after completion
  
  # How many times to retry failed pods
  backoffLimit: 4
  
  # Pod template (same as pods/deployments)
  template:
    spec:
      # Restart policy must be OnFailure or Never for jobs
      restartPolicy: OnFailure
      
      containers:
      - name: processor
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - 'echo "Processing data..." && sleep 10 && echo "Done"'
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ============================================================================
# JOB WITH ARRAY (PARALLEL INDEPENDENT TASKS)
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-job-array
  namespace: default
spec:
  completions: 4        # Run 4 times
  parallelism: 2        # 2 at a time
  
  template:
    spec:
      restartPolicy: OnFailure
      
      containers:
      - name: task
        image: busybox:latest
        
        # Get task index from JOB_COMPLETION_INDEX environment variable
        command:
        - /bin/sh
        - -c
        - 'echo "Task index: $JOB_COMPLETION_INDEX" && sleep $((RANDOM % 10))'
        
        env:
        - name: JOB_COMPLETION_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']

---
# ============================================================================
# CRONJOB - SCHEDULED JOBS (LIKE CRON)
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cronjob
  namespace: default
spec:
  # Cron schedule (standard Linux cron syntax)
  # minute (0-59) hour (0-23) day (1-31) month (1-12) weekday (0-6)
  schedule: "0 2 * * *"  # 2:00 AM daily
  
  # Timezone (optional, uses UTC by default)
  timeZone: "Asia/Ho_Chi_Minh"
  
  # Number of failed jobs to retain
  failedJobsHistoryLimit: 1
  
  # Number of successful jobs to retain
  successfulJobsHistoryLimit: 3
  
  # Deadline for job completion (seconds)
  startingDeadlineSeconds: 10
  
  # Scheduler's concurrency policy
  concurrencyPolicy: Allow  # Allow, Forbid, Replace
  
  # Job template
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          
          containers:
          - name: backup
            image: busybox:latest
            command:
            - /bin/sh
            - -c
            - 'echo "Starting backup at $(date)" && echo "Backup completed" '

---
# ============================================================================
# DAEMONSET - RUN POD ON EVERY NODE
# ============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-monitor-daemonset
  namespace: default
spec:
  selector:
    matchLabels:
      app: node-monitor
  
  # Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # How many nodes to update at once
  
  template:
    metadata:
      labels:
        app: node-monitor
    
    spec:
      # Node selector - run only on nodes matching label
      nodeSelector:
        node-type: worker
      
      # Tolerations - allow scheduling on tainted nodes
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      
      containers:
      - name: monitor
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - 'while true; do echo "Node: $(hostname)"; sleep 30; done'
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
      
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory

---
# ============================================================================
# DAEMONSET WITH HOST PORT
# ============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd-daemonset
  namespace: logging
spec:
  selector:
    matchLabels:
      app: fluentd
  
  template:
    metadata:
      labels:
        app: fluentd
    
    spec:
      # Tolerate all taints
      tolerations:
      - operator: Exists
      
      containers:
      - name: fluentd
        image: fluent/fluentd:latest
        
        ports:
        - containerPort: 24224
          hostPort: 24224  # Expose on host
          name: fluent
        
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
      
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers

---
# ============================================================================
# RESOURCE QUOTA - LIMIT NAMESPACE RESOURCES
# ============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: production
spec:
  hard:
    # Pod limits
    pods: "100"
    
    # Compute resources
    requests.cpu: "100"
    requests.memory: "500Gi"
    limits.cpu: "200"
    limits.memory: "1000Gi"
    
    # Storage
    requests.storage: "1000Gi"
    
    # Other resource types
    persistentvolumeclaims: "10"
    services.nodeports: "5"
    services.loadbalancers: "2"

---
# ============================================================================
# LIMIT RANGE - DEFAULT/MIN/MAX RESOURCE LIMITS
# ============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limit-range
  namespace: production
spec:
  limits:
  # For Pods
  - type: Pod
    max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
  
  # For Containers
  - type: Container
    max:
      cpu: "1"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"

---
# ============================================================================
# POD DISRUPTION BUDGET - AVOID DISRUPTIONS
# ============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-app-pdb
  namespace: default
spec:
  # Minimum pods that must remain available
  minAvailable: 2
  # Or use maxUnavailable: 1
  
  # Select pods
  selector:
    matchLabels:
      app: web

---
# ============================================================================
# ROLE - DEFINE PERMISSIONS
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
# Allow reading pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Allow reading pod logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

# Allow port forwarding
- apiGroups: [""]
  resources: ["pods/portforward"]
  verbs: ["create"]

---
# ============================================================================
# ROLEBINDING - BIND ROLE TO USER/SERVICE ACCOUNT
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
subjects:
- kind: ServiceAccount
  name: default
  namespace: default

---
# ============================================================================
# SERVICE ACCOUNT
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: default

---
# ============================================================================
# POD WITH SERVICE ACCOUNT
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-sa
  namespace: default
spec:
  # Use service account
  serviceAccountName: app-service-account
  
  containers:
  - name: app
    image: nginx:latest
    
    # Mount service account token
    volumeMounts:
    - name: kube-api-access
      mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  
  volumes:
  - name: kube-api-access
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600

---
# ============================================================================
# CLUSTER ROLE - CLUSTER-WIDE PERMISSIONS
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin-read
rules:
# Read nodes
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

# Read namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# Read persistent volumes
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch"]

---
# ============================================================================
# CLUSTER ROLE BINDING
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: read-cluster-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin-read
subjects:
- kind: ServiceAccount
  name: cluster-reader-sa
  namespace: monitoring

---
