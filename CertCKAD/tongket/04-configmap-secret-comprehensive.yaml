# ============================================================================
# COMPREHENSIVE CONFIGMAP AND SECRET EXAMPLES FOR CKAD EXAM
# ============================================================================

---
# ============================================================================
# CONFIGMAP - LITERALS FROM COMMAND LINE
# kubectl create configmap app-config --from-literal=key1=value1 --from-literal=key2=value2 --dry-run=client -o yaml > configmap.yaml
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: literal-configmap
  namespace: default
  labels:
    type: configuration
data:
  # Simple key-value pairs
  app-name: "ProductionApp"
  environment: "prod"
  log-level: "INFO"
  max-connections: "100"
  timeout: "30s"
  enabled: "true"

---
# ============================================================================
# CONFIGMAP - FROM FILE
# kubectl create configmap file-configmap --from-file=config.yml --dry-run=client -o yaml > configmap.yaml
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: file-configmap
  namespace: default
data:
  # File contents as key-value
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8080
      debug: false
    database:
      host: db-service
      port: 5432
      name: mydb
      pool_size: 20
    logging:
      level: INFO
      format: json
  
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 1024;
    }
    http {
      server {
        listen 80;
        server_name _;
        location / {
          proxy_pass http://backend;
        }
      }
    }
  
  app.properties: |
    app.name=MyApp
    app.version=1.0.0
    app.environment=production
    database.url=jdbc:postgresql://db:5432/mydb
    cache.enabled=true

---
# ============================================================================
# CONFIGMAP - BINARY/MULTIPLE FILES IN ONE
# kubectl create configmap multi-config \
#   --from-file=dir1/file1 \
#   --from-file=dir2/file2 \
#   --dry-run=client -o yaml > configmap.yaml
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-file-configmap
  namespace: default
data:
  db-config: |
    [postgresql]
    host=localhost
    port=5432
    user=admin
  
  app-config: |
    [app]
    name=MyApp
    version=1.0

---
# ============================================================================
# SECRET - GENERIC (OPAQUE)
# kubectl create secret generic app-secret \
#   --from-literal=username=admin \
#   --from-literal=password=secretpass123 \
#   --dry-run=client -o yaml > secret.yaml
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: generic-secret
  namespace: default
type: Opaque
data:
  # Base64 encoded values: echo -n "value" | base64
  username: YWRtaW4=                              # admin
  password: c2VjcmV0cGFzczEyMw==                 # secretpass123
  db-password: cGFzc3dvcmQtZGJAMTIz               # password-db@123
  api-key: c2VjcmV0LWFwaS1rZXktYWJjZGVmZ2hpams= # secret-api-key-abcdefghijk

---
# ============================================================================
# SECRET - DOCKER REGISTRY (FOR IMAGE PULL)
# kubectl create secret docker-registry docker-secret \
#   --docker-server=docker.io \
#   --docker-username=username \
#   --docker-password=password \
#   --docker-email=email@example.com \
#   --dry-run=client -o yaml > docker-secret.yaml
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: default
type: kubernetes.io/dockercfg
data:
  .dockercfg: eyJkb2NrZXIuaW8iOnsidXNlcm5hbWUiOiJ1c2VybmFtZSIsInBhc3N3b3JkIjoicGFzc3dvcmQiLCJlbWFpbCI6ImVtYWlsQGV4YW1wbGUuY29tIiwiYXV0aCI6InVzZXJuYW1lOnBhc3N3b3JkIn19

---
# ============================================================================
# SECRET - TLS/HTTPS
# kubectl create secret tls tls-secret \
#   --cert=path/to/tls.crt \
#   --key=path/to/tls.key \
#   --dry-run=client -o yaml > tls-secret.yaml
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSURkVENDQWwych... # base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUVwQUlCQU... # base64 encoded key

---
# ============================================================================
# SECRET - WITH STRINGDATA (AUTO BASE64 ENCODE)
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: stringdata-secret
  namespace: default
type: Opaque
stringData:
  # These will be automatically base64 encoded
  username: admin
  password: SecurePassword123!
  connection-string: "postgresql://admin:password@db-service:5432/mydb"

---
# ============================================================================
# POD USING CONFIGMAP - METHOD 1: ENV VARIABLES
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: configmap-env-pod
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:latest
    
    env:
    # Single key from ConfigMap
    - name: APP_NAME
      valueFrom:
        configMapKeyRef:
          name: literal-configmap
          key: app-name
          optional: false  # Pod fails if ConfigMap key doesn't exist
    
    - name: LOG_LEVEL
      valueFrom:
        configMapKeyRef:
          name: literal-configmap
          key: log-level
          optional: true   # Pod succeeds even if key doesn't exist
    
    # Load entire ConfigMap as environment variables
    envFrom:
    - configMapRef:
        name: literal-configmap

---
# ============================================================================
# POD USING CONFIGMAP - METHOD 2: VOLUME MOUNT
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-pod
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:latest
    
    volumeMounts:
    # Mount ConfigMap as read-only files
    - name: config
      mountPath: /etc/config
      readOnly: true
    
    # Mount specific keys from ConfigMap
    - name: specific-config
      mountPath: /etc/app-config
      readOnly: true
  
  volumes:
  # Mount entire ConfigMap
  - name: config
    configMap:
      name: file-configmap
      defaultMode: 0644  # File permissions (rw-r--r--)
  
  # Mount specific keys only
  - name: specific-config
    configMap:
      name: literal-configmap
      items:
      - key: app-name
        path: app-name.txt
      - key: log-level
        path: log-level.txt
      defaultMode: 0444  # Read-only (r--r--r--)

---
# ============================================================================
# POD USING SECRET - METHOD 1: ENV VARIABLES
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:latest
    
    env:
    # Single key from Secret
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: generic-secret
          key: db-password
          optional: false
    
    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: generic-secret
          key: api-key
    
    # Load entire Secret as environment variables
    envFrom:
    - secretRef:
        name: generic-secret

---
# ============================================================================
# POD USING SECRET - METHOD 2: VOLUME MOUNT
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:latest
    
    volumeMounts:
    # Mount Secret as read-only files
    - name: secret-files
      mountPath: /etc/secrets
      readOnly: true
  
  volumes:
  # Mount entire Secret
  - name: secret-files
    secret:
      secretName: generic-secret
      defaultMode: 0600  # rw------- (secure)

---
# ============================================================================
# POD WITH DOCKER REGISTRY SECRET (IMAGE PULL)
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: private-image-pod
  namespace: default
spec:
  # Use docker registry secret for pulling private images
  imagePullSecrets:
  - name: docker-registry-secret
  
  containers:
  - name: app
    image: private-registry.com/myapp:v1.0

---
# ============================================================================
# EDIT CONFIGMAP/SECRET AND APPLY CHANGES
# kubectl edit configmap literal-configmap
# kubectl edit secret generic-secret
# (Changes apply immediately to volume mounts)
# (Pods must be recreated to get new env variables)
# ============================================================================

---
