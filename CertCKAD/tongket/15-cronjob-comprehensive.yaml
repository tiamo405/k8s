# ============================================================================
# CRONJOB EXAMPLES (CKAD)
# Aligned with: CertCKAD/cronjob/
# ============================================================================

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: time-job
spec:
  schedule: '*/1 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      name: time-job
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: time
            image: busybox
            command: ["/bin/sh", "-c", "date"]

# Quick commands:
# kubectl apply -f 15-cronjob-comprehensive.yaml
# kubectl get cronjob
# kubectl describe cronjob time-job
# kubectl get jobs --watch
