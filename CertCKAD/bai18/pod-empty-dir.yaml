apiVersion: v1
kind: Pod
metadata:
  name: empty-dir-demo
spec:
  volumes:
  - name: temp-data
    emptyDir:
      medium: Memory
      sizeLimit: 10Mi
  containers:
  - name: writer
    image: busybox
    command: ['sh', '-c', 'echo "Hello CKAD" > /output/message.txt && sleep 3600']
    volumeMounts:
    - name: temp-data
      mountPath: /output
  - name: reader
    image: busybox
    command: ['sh', '-c', 'sleep 3600']
    volumeMounts:
    - name: temp-data
      mountPath: /input