apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
spec:
  rules:
  - host: web.example.com
    http:
      paths:
      - backend:
          service:
            name: web-svc
            port:
              number: 8080
        path: /
        pathType: Prefix
status:
  loadBalancer: {}
