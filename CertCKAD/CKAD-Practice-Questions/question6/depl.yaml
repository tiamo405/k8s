apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webapp
    version: v1
  name: web-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: webapp
      version: v1
  strategy: {}
  template:
    metadata:
      labels:
        app: webapp
        version: v1
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
