apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api-app
  namespace: exam-3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy: {}
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - image: nginx:alpine
        name: nginx
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 200m
        env:
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_MODE
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: API_KEY
status: {}
