apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: exam-3
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: api-svc
            port:
              number: 80
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: web-svc
            port:
              number: 80
        path: /web
        pathType: Prefix
status:
  loadBalancer: {}
