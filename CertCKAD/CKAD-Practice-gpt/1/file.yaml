apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: gpt-question-1
type: Opaque
data:
  username: YWRtaW4=
  password: U2VjcmV0MTIz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
  namespace: gpt-question-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: app
        image: nginx
        env:
        - name: DB_USER
          value: admin
        - name: DB_PASS
          value: wrongpassword
